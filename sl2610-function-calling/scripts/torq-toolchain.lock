# torq-toolchain.lock — SINGLE SOURCE OF TRUTH for the SL2610 Torq compiler↔runtime↔firmware triple.
# Established by scripts/torq-verify.sh --matrix (2026-07-07). This file — not the prose in
# docs/torq.md — is the authoritative answer to "which Torq version do we use, and does it work".
# Re-run scripts/torq-board-audit.sh (drift) and scripts/torq-verify.sh (gate) after ANY change.

# ---- Board (verified via scripts/torq-board-audit.sh) ----
BOARD_SDK=scarthgap_6.12_v2.4.0
BOARD_KERNEL=6.12.62

# The board carries THREE distinct Torq runtimes (each a different executable format). The app
# (src/linuxArm64Main/.../MoonshineDecoder.kt `torqBin`) currently calls the ALPHA one — that is a
# latent mismatch; the canonical runtime for our v2 compiler is torq2-stable (see runbook).
#   native-beta  /usr/bin/iree-run-module ................ torq-runtime/2.0.0_beta  accepts exec v1
#   app-alpha    .../sl2610-voice-cc/.venv/.../torq-run-module  torq_runtime-2.0.0a1  (vendor prebuilts exec v0; runs v2 leniently)
#   torq2-stable /home/root/torq2-stable/.../torq-run-module    torq_runtime-2.0.0   runs exec v2   <-- canonical
#   torq2        /home/root/torq2/torq_libs/torq-run-module     stable v2.0.0        runs exec v2

# ---- Canonical (pinned) toolchain for our vmfbs ----
COMPILER_KIND=stable-docker
COMPILER_ID=sl2610-iree:v2.0.0                 # Dockerfile.iree: torq_compiler 2.0.0 wheel (github v2.0.0)
COMPILER_EMITS_EXEC=2
BOARD_RUNTIME_ID=torq2-stable
BOARD_RUNTIME_PATH=/home/root/torq2-stable/torq/_runtime_libs/torq-run-module
BOARD_RUNTIME_VERSION=torq_runtime-2.0.0
EXEC_FORMAT=2

# ---- Canary gate result (scripts/torq-verify.sh --matrix) ----
# PARTIAL: single-dispatch graphs execute correctly; SOME multi-dispatch artifacts of ours zero out.
CANARY_STATUS=PARTIAL
CANARY_DATE=2026-07-07
CANARY_identity_1x4=PASS      # exec-format loads + trivial matmul correct
CANARY_chain2_64=PASS         # 2 chained matmuls correct (4096)
CANARY_chain8_64=FAIL         # our 8-chained-matmul artifact -> ZEROS (compile/artifact defect, NOT hw ceiling; see below)
CANARY_softmax_64=FAIL        # our softmax_64 canary zeros, BUT /home/root/moon/sm.vmfb (matmul->softmax->matmul) RUNS -> CSS works

# ---- RESOLVED 2026-07-07: the discriminator is DISPATCH COUNT (compiler-capability gap) ----
# The VENDOR's own encoder.vmfb (/home/root/sl2610-examples/models/Synaptics/moonshine-tiny-bf16-torq/
# encoder.vmfb, 14.5MB, 6-layer) RUNS CORRECTLY on the NPU: in bf16[1,288,207] -> out bf16[1,207,288],
# nonzero_frac=1.0, absmean 0.25. CRUCIALLY it compiles to **1 fused dispatch**. OUR self-compiled encoder
# compiles to **40 dispatches** and returns ALL ZEROS. Dispatch counts, same board/runtime:
#   vendor encoder  = 1 dispatch  -> RUNS        our enc-1L = 40 dispatches -> ZERO
#   our chain2      = 1 dispatch  -> RUNS        our sm      = 2 dispatches -> RUN
# So the SL2610 RUNTIME reliably executes only a FEW dispatches; the vendor gets a full encoder onto the
# NPU by FUSING it to ONE dispatch. The NPU *hardware* is fine (runs the vendor's 1-dispatch encoder); the
# earlier "not a hardware limit, our-compile f32-tail defect, fixable by matching the recipe" framing was
# SUPERSEDED — the clean vendor DTYPE recipe (TorqMatmulBf16Pass: bf16xbf16->f32 matmuls, f32 reductions,
# verified in the MLIR) STILL zeros, because our compiler cannot FUSE the encoder to one dispatch:
#   tiling ON (ENC_TORQ=1)  -> compiles but 40 dispatches -> runtime zeros
#   tiling OFF (full block) -> CSS codegen CRASH (css_linalg.generic, bf16 attention/softmax as one kernel)
# The vendor's compiler build fuses the whole encoder to 1 dispatch with no tiling / no CSS crash — a
# capability sl2610-iree:v2.0.0 (our docker compiler) does NOT have. NOT fixable by dtype/clock/flags.
# NPU clock (devmem 0xf7e104b0 32 0x216) is a red herring for the zeros: the vendor encoder runs
# bit-identically at the boot clock 0x298 and at 0x216 (it is a defensive setup step, not a fix).

# ---- Consequences (enforced by tooling) ----
# NPU_MULTIDISPATCH_TRUSTED=no  -> OUR self-compiled encoder/decoder vmfbs must NOT be trusted on
#   --device=torq: our compiler emits many dispatches the runtime can't run. SHIPPED PATH: the demo
#   (voicecc asr) runs the VENDOR's 1-dispatch encoder.vmfb on --device=torq (MoonshineDecoder default)
#   + OUR self-compiled decoder on CPU -> verified e2e on the board: "One, two, three." / "Turn the light
#   on" / "Set an alarm for 7 a.m.". Self-compiling the encoder needs the vendor's fusing compiler build.
NPU_MULTIDISPATCH_TRUSTED=no
NPU_CLOCK_ENABLE=devmem 0xf7e104b0 32 0x216   # vendor-parity NPU clock; DEFENSIVE (runs at boot clock too), MoonshineDecoder.init sets it
NOTES=Runtime executes only a few dispatches. Vendor encoder = 1 FUSED dispatch -> runs; ours = 40 dispatches -> zeros. Our compiler cannot fuse (tiling->40 dispatches, no-tiling->CSS crash); vendor's build fuses to 1. Compiler-capability gap, NOT fixable by dtype recipe/clock/flags. Demo ships the vendor encoder.vmfb on NPU (verified e2e). See memory torq-vendor-encoder-runs-on-npu.

# ---- "Current tool" verified (2026-07-07) ----
# LATEST Torq framework release = v2.0.0 (github synaptics-torq/torq-compiler, 2026-06-20). There is
# NO Torq v2.4.0 — "v2.4.0" is the Astra SDK version (the board OS), not the Torq toolchain.
# The official v2.0.0 aarch64 runtime wheel was installed fresh on the board
# (/home/root/torq-v2.0.0-official, runtime id `official-v2`) and gated against the pinned v2.0.0
# compiler: identity+chain2 PASS, chain8+softmax FAIL (EXEC then no output) — IDENTICAL to the
# deployed runtimes. So it is NOT a toolchain-version gap (upgrading the Torq runtime can't fix it).
# The real cause is the dispatch-fusion gap resolved above: the RUNTIME runs only a few dispatches and
# our COMPILER can't fuse the encoder to one (the vendor's build can). Kernel-driver lever is a dead end
# (see below); SyNAP untried; the shipped path is the vendor's 1-dispatch encoder.vmfb on the NPU.
LATEST_TORQ_RELEASE=v2.0.0
CURRENT_TOOL_GATE=official v2.0.0 compiler x official v2.0.0 runtime -> multi-dispatch still FAIL (2026-07-07)

# ---- Kernel-driver lever investigated (2026-07-07): DEAD END, non-destructively ----
# Board NPU driver = syna_npu.ko, a LOADABLE module (/lib/modules/6.12.62/updates/syna_npu.ko,
# loaded, bound to platform dev f7600000.synpu; GPL, vermagic 6.12.62, no exported version string).
# The v2.0.0 release's syna-kernel-artifacts.tgz is a KERNEL BUILD TREE (.config, Makefile, arch,
# include, scripts) — 0 .ko files, 0 npu/synpu/torq driver source. It is headers to build
# out-of-tree modules AGAINST, not a droppable driver. So there is NO newer syna_npu.ko to install
# and NO source to build one. A driver update would require Synaptics to ship the syna_npu source or
# a prebuilt .ko for kernel 6.12.62 (neither is in the public v2.0.0 release), OR a full SDK reflash.
# Not attempted (board is SSH-only; brick = physical reflash). NPU multi-dispatch remains blocked;
# shippable path stays the CPU floor (--device=local-task).
KERNEL_DRIVER_LEVER=dead-end: no syna_npu.ko/source in v2.0.0 artifacts; needs vendor driver or reflash
