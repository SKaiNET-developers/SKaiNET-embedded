site:
  title: SKaiNET Embedded
  start_page: skainet-embedded::index.adoc

runtime:
  cache_dir: ./.cache/antora

content:
  sources:
    # This site aggregates every docs component in the repo, so a single Pages
    # deployment serves all of them (component switcher in the UI).
    - url: /antora
      start_path: docs
      branches: HEAD
    # The older Coral NPU full-stack docs (component: coral-npu-stack), folded in
    # here instead of a second, competing Pages workflow.
    - url: /antora
      start_path: coralnpu/docs
      branches: HEAD

asciidoc:
  attributes:
    stem: latexmath
  extensions:
    - /opt/antora/local-mermaid-extension.js

ui:
  bundle:
    url: https://github.com/SKaiNET-developers/skainet-docs-ui/releases/download/v1.1.1/ui-bundle.zip
    snapshot: true
  supplemental_files: ./supplemental-ui

output:
  dir: ./build/site
